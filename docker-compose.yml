services:

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: reword
      POSTGRES_PASSWORD: reword
      POSTGRES_DB: reword
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reword"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  createbuckets:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/reword &&
      mc anonymous set download local/reword/audio
      "

  migrate:
    build: .
    command: alembic upgrade head
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://reword:reword@db:5432/reword
    depends_on:
      db:
        condition: service_healthy

  app:
    build: .
    ports:
      - "8002:8002"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://reword:reword@db:5432/reword
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_URL: http://localhost:9000
    depends_on:
      migrate:
        condition: service_completed_successfully
      createbuckets:
        condition: service_completed_successfully

volumes:
  postgres_data:
  minio_data:
